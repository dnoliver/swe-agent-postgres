services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./tasks/${TASK}.sql:/docker-entrypoint-initdb.d/db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: postgres
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./servers.json:/home/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
 
  agent:
    build:
      context: ./environment
      dockerfile: Dockerfile
    image: swe-agent-postgres-environment:latest
    container_name: agent
    tty: true
    stdin_open: true
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        until pg_isready -h host.docker.internal -p 5432 -U postgres; do
          echo 'Waiting for PostgreSQL to be ready...';
          sleep 2;
        done &&
        echo 'PostgreSQL is ready!' &&
        cp /tmp/TASK.md /agent/TASK.md &&
        mini-extra config set ANTHROPIC_API_KEY \"$ANTHROPIC_API_KEY\" &&
        mini-extra config set MSWEA_MODEL_NAME \"$MSWEA_MODEL_NAME\" &&
        mini-extra config set MSWEA_CONFIGURED true && \
        mini --task /agent/TASK.md --cost-limit=1 --output /agent/trajectory.json --yolo --exit-immediately && \
        tail -f /dev/null
      "
    volumes:
      - ./agent:/agent
      - ./tasks/${TASK}.md:/tmp/TASK.md

volumes:
  pgadmin-data:
